{% extends 'grades/base.html' %}
{% block content %}
<div class="login-panel">
    <div class="login-card">
        <h2>Password Updated</h2>
        <p>Your password has been changed successfully.</p>
        <p class="helper-text">
            {% if user.is_staff %}
                <a href="{% url 'teacher_dashboard' %}">Return to Teacher Dashboard</a>
            {% else %}
                <a href="{% url 'student_dashboard' %}">Return to Student Dashboard</a>
            {% endif %}
        </p>
    </div>
</div>
{% endblock %}
